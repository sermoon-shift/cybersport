{% extends "base.html" %}

{% block content %}
<header class="border-b border-emerald-800 pb-4 mb-10">
    <h1 class="text-4xl font-bold text-white uppercase tracking-wider text-center">Новости</h1>
</header>

<ul class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    {% for item in news_list %}
    <li class="max-w-sm mx-auto bg-emerald-900 border border-emerald-800 rounded-lg shadow-xl overflow-hidden transition-transform hover:scale-[1.02]">
        <a href="{{ url_for('news_detail', news_id=item.id) }}">
            <div class="relative h-64 overflow-hidden flex justify-center items-center">
                <img class="absolute inset-0 w-full h-full object-cover"
                    src="{{ url_for('static', filename='img/' + item.image) }}" alt="Фон новости">
                <div class="absolute bottom-0 left-0 right-0 h-10 bg-emerald-900"
                    style="clip-path: polygon(0 100%, 100% 100%, 100% 0);"></div>
            </div>
            <div class="p-6">
                <h5 class="mb-4 text-2xl font-bold tracking-tight text-white leading-tight uppercase">
                    {{ item.title }}
                </h5>
                <p class="text-emerald-100 text-sm mb-4 line-clamp-3">{{ item.intro }}</p>
                <div class="text-sm font-medium text-emerald-300">
                    {{ item.date.strftime('%d.%m.%Y') }}
                </div>
            </div>
        </a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
