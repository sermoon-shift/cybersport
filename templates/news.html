{% extends "base.html" %}

{% block content %}
<header class="border-b border-emerald-800 pb-4 mb-10">
    <h1 class="text-4xl font-bold text-white uppercase tracking-wider text-center">Новости</h1>
</header>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    {% for item in news_list %}
    <div class="bg-emerald-900 p-6 rounded-lg shadow-xl border border-emerald-800 flex flex-col">
        <a href="{{ url_for('news_detail', news_id=item.id) }}" class="block overflow-hidden rounded-lg mb-6">
            <img class="hover:scale-105 transition-transform duration-300 w-full h-48 object-cover"
                 src="{{ url_for('static', filename='img/' + item.image) }}" alt="News" />
        </a>
        <h2 class="text-2xl font-semibold text-white mb-2 uppercase">{{ item.title }}</h2>
        <p class="text-emerald-100 mb-6 flex-grow line-clamp-2 italic text-sm">
            {{ item.date.strftime('%d.%m.%Y') }}
        </p>
        <p class="text-emerald-100 mb-6 flex-grow">{{ item.intro }}</p>
        <a href="{{ url_for('news_detail', news_id=item.id) }}"
           class="w-full block text-center px-4 py-2 bg-emerald-700 text-white rounded font-bold hover:bg-emerald-600 transition-colors uppercase text-sm">
            Читать полностью
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
