<!doctype html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="{{ url_for('static', filename='dist/output.css') }}" rel="stylesheet">
    <title>ФКС РК</title>
</head>

<body class="bg-green-950 text-emerald-100 min-h-screen">
    <nav class="bg-emerald-900/90 backdrop-blur-sm fixed w-full z-20 top-0 border-b border-emerald-800">
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
            <a href="/" class="flex items-center space-x-3 rtl:space-x-reverse">
                <img src="{{ url_for('static', filename='img/avatar.jpg') }}" class="h-16" alt="Logo" />
                <span class="text-2xl font-bold text-white">ФКС РК</span>
            </a>
            <button data-collapse-toggle="navbar-default" type="button"
                class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-emerald-300 rounded-lg md:hidden hover:bg-emerald-800 focus:outline-none focus:ring-2 focus:ring-emerald-700"
                aria-controls="navbar-default" aria-expanded="false">
                <span class="sr-only">Open main menu</span>
                <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
            <div class="hidden w-full md:block md:w-auto" id="navbar-default">
                <ul
                    class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-emerald-800 rounded-lg bg-emerald-900 md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0">
                    <li>
                        <a href="/"
                            class="block py-2 px-3 text-white hover:text-green-400 md:p-0 transition-colors">Главная</a>
                    </li>
                    <li>
                        <a href="/news"
                            class="block py-2 px-3 text-white hover:text-green-400 md:p-0 transition-colors">Новости</a>
                    </li>
                    <li>
                        <a href="#"
                            class="block py-2 px-3 text-white hover:text-green-400 md:p-0 transition-colors">Запись на
                            турниры</a>
                    </li>
                    <li>
                        <a href="/login"
                            class="block py-2 px-3 text-white hover:text-green-400 md:p-0 transition-colors">Войти</a>
                    </li>
                    <li>
                        <a href="https://vk.com/cyberkomi" class="block py-2 px-3 md:p-0">
                            <img src="{{ url_for('static', filename='img/vk.png') }}" class="w-6 h-6" alt="VK">
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="max-w-screen-xl mx-auto p-8 pt-32">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-20 py-16 border-t">
        {% block footer %}{% endblock %}
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
</body>

</html>
